<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Tools Dashboard</title>
<script>try{if(localStorage.getItem('zuper_tools_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<header class="dashboard-header">
  <h1>Internal Tools Dashboard</h1>
  <p>Quick access to internal utilities</p>
</header>

<div class="board-controls">
  <input type="search" id="board-search" class="board-search" placeholder="Search tools…" autocomplete="off">
  <button type="button" class="board-btn" id="manage-toggle" title="Enable delete &amp; drag-to-reorder">⚙ Manage</button>
  <button type="button" class="board-btn" data-theme-toggle>🌙 Dark</button>
</div>

<main class="dashboard-grid" id="dashboard-grid">
  <!-- Tool tiles + the Add/Update tiles are rendered by board.js / manage-tools.js -->
</main>
<div class="board-empty" id="board-empty" hidden>No tools match your search.</div>

<!-- Add Tool modal -->
<div class="modal-overlay" id="add-tool-overlay" hidden>
  <form class="modal" id="add-tool-form">
    <h2>Add a new tool</h2>

    <label>
      Name
      <input type="text" id="at-name" required maxlength="120" placeholder="e.g. Warranty Letter Generator">
    </label>

    <label>
      Description
      <input type="text" id="at-description" required maxlength="300" placeholder="One line describing what it does">
    </label>

    <label>
      Help text (optional)
      <input type="text" id="at-help" maxlength="500" placeholder="Longer explanation shown in the ⓘ popover">
    </label>

    <label>
      Icon (single emoji, optional)
      <input type="text" id="at-icon" maxlength="4" placeholder="🔧">
    </label>

    <label>
      Tool HTML file
      <input type="file" id="at-file" accept=".html,.htm" required>
      <span class="modal-hint">Max 3MB per file</span>
    </label>

    <label>
      Admin password
      <input type="password" id="at-password" required>
    </label>

    <p class="modal-error" id="at-error" hidden></p>
    <p class="modal-status" id="at-status" hidden></p>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="at-cancel">Cancel</button>
      <button type="submit" class="btn btn-primary" id="at-submit">Add Tool</button>
    </div>
  </form>
</div>

<!-- Help popover -->
<div class="modal-overlay" id="help-overlay" hidden>
  <div class="modal" style="max-width:460px">
    <h2 id="help-title">Tool</h2>
    <p class="help-body" id="help-body"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="help-close">Close</button>
    </div>
  </div>
</div>

<script src="assets/tools.config.js"></script>
<script src="assets/manage-tools.js"></script>
<script src="assets/board.js"></script>
<script src="assets/theme.js"></script>

</body>
</html>
