<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Tools Dashboard</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<header class="dashboard-header">
  <h1>Internal Tools Dashboard</h1>
  <p>Quick access to internal utilities</p>
</header>

<main class="dashboard-grid" id="dashboard-grid">
  <!-- Tiles are rendered here below; the "+ Add Tool" tile is appended by add-tool.js -->
</main>

<div class="modal-overlay" id="add-tool-overlay" hidden>
  <form class="modal" id="add-tool-form">
    <h2>Add a new tool</h2>

    <label>
      Name
      <input type="text" id="at-name" required maxlength="120" placeholder="e.g. Warranty Letter Generator">
    </label>

    <label>
      Description
      <input type="text" id="at-description" required maxlength="300" placeholder="One line describing what it does">
    </label>

    <label>
      Icon (single emoji, optional)
      <input type="text" id="at-icon" maxlength="4" placeholder="🔧">
    </label>

    <label>
      Tool HTML file
      <input type="file" id="at-file" accept=".html,.htm" required>
    </label>

    <label>
      Admin password
      <input type="password" id="at-password" required>
    </label>

    <p class="modal-error" id="at-error" hidden></p>
    <p class="modal-status" id="at-status" hidden></p>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="at-cancel">Cancel</button>
      <button type="submit" class="btn btn-primary" id="at-submit">Add Tool</button>
    </div>
  </form>
</div>

<script src="assets/tools.config.js"></script>
<script>
  const grid = document.getElementById("dashboard-grid");

  function renderTile(tool, exists) {
    const tag = exists ? "a" : "div";
    const el = document.createElement(tag);
    el.className = "tile" + (exists ? "" : " tile-disabled");
    if (exists) el.href = tool.file;

    el.innerHTML = `
      <div class="tile-icon">${tool.icon || "🔧"}</div>
      <h2>${tool.name}</h2>
      <p>${tool.description || ""}</p>
      ${exists ? "" : '<span class="tile-badge">Not yet available</span>'}
    `;
    return el;
  }

  async function fileExists(path) {
    try {
      const res = await fetch(path, { method: "HEAD", cache: "no-store" });
      return res.ok;
    } catch (err) {
      return false;
    }
  }

  async function init() {
    for (const tool of TOOLS) {
      const exists = await fileExists(tool.file);
      grid.appendChild(renderTile(tool, exists));
    }
    if (window.renderAddToolTile) window.renderAddToolTile(grid);
  }

  init();
</script>
<script src="assets/add-tool.js"></script>

</body>
</html>
